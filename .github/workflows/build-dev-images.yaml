name: Build development images

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/build-dev-images.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-dev-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [api, web]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/${{ matrix.component }}
          file: ./apps/${{ matrix.component }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/food-delivery-${{ matrix.component }}:dev
            ghcr.io/${{ github.repository_owner }}/food-delivery-${{ matrix.component }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: true
          sbom: true
