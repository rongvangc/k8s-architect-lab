---
- name: Provision the Kubernetes cluster
  hosts: kubernetes
  become: true
  gather_facts: true
  roles:
    - common
    - containerd
    - kubernetes_packages

- name: Bootstrap the control plane and GitOps platform
  hosts: control_plane
  become: true
  gather_facts: true
  roles:
    - control_plane
    - application_secrets
    - argocd
