---
- name: Assert GitOps repository URL is configured
  ansible.builtin.assert:
    that:
      - git_repo_url != "REPLACE_WITH_REPO_URL"
      - git_repo_url is match('^https://')
    fail_msg: Set git_repo_url to the pushed repository URL before enabling GitOps bootstrap.
  when: gitops_bootstrap_enabled | bool

- name: Download pinned Argo CD installation manifest
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml"
    dest: /etc/kubernetes/argocd-install.yaml
    checksum: "sha256:{{ argocd_install_sha256 }}"
    mode: "0644"

- name: Apply Argo CD namespace
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: argocd
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: argocd_namespace_apply
  changed_when: "'created' in argocd_namespace_apply.stdout or 'configured' in argocd_namespace_apply.stdout"

- name: Assert Argo CD Image Updater GitHub token is provided
  ansible.builtin.assert:
    that:
      - vault_github_token is defined
      - vault_github_token | length >= 20
      - vault_github_token != "REPLACE_WITH_GITHUB_TOKEN"
      - argocd_image_updater_git_username is defined
      - argocd_image_updater_git_username != "REPLACE_WITH_GITHUB_USER"
    fail_msg: >-
      Define vault_github_token and argocd_image_updater_git_username before
      enabling Argo CD Image Updater. The token needs repo write access and
      package read access for GHCR.
  when: argocd_image_updater_enabled | default(false) | bool
  no_log: true

- name: Apply Argo CD Image Updater Git credentials
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-image-updater-git-creds
        namespace: argocd
      type: Opaque
      stringData:
        username: {{ argocd_image_updater_git_username }}
        password: {{ vault_github_token }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: image_updater_git_creds_apply
  changed_when: "'created' in image_updater_git_creds_apply.stdout or 'configured' in image_updater_git_creds_apply.stdout"
  when: argocd_image_updater_enabled | default(false) | bool
  no_log: true

- name: Apply Argo CD Image Updater GHCR credentials
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-image-updater-ghcr-creds
        namespace: argocd
      type: Opaque
      stringData:
        creds: {{ argocd_image_updater_git_username }}:{{ vault_github_token }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: image_updater_ghcr_creds_apply
  changed_when: "'created' in image_updater_ghcr_creds_apply.stdout or 'configured' in image_updater_ghcr_creds_apply.stdout"
  when: argocd_image_updater_enabled | default(false) | bool
  no_log: true

- name: Install Argo CD
  ansible.builtin.command:
    cmd: kubectl apply --server-side=true -n argocd -f /etc/kubernetes/argocd-install.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: argocd_apply
  changed_when: "'created' in argocd_apply.stdout or 'configured' in argocd_apply.stdout"

- name: Wait for Argo CD server
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/argocd-server -n argocd --timeout=600s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Wait for Argo CD application controller
  ansible.builtin.command:
    cmd: kubectl rollout status statefulset/argocd-application-controller -n argocd --timeout=600s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Expose Argo CD through a NodePort for temporary VPS access
  ansible.builtin.command:
    cmd: kubectl patch service argocd-server -n argocd --type=merge -p '{"spec":{"type":"NodePort"}}'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: argocd_nodeport_apply
  changed_when: "'patched' in argocd_nodeport_apply.stdout"
  when: argocd_expose_nodeport | bool

- name: Apply restricted bootstrap AppProject
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: "{{ lookup('ansible.builtin.file', playbook_dir + '/../../platform/bootstrap/platform-bootstrap-project.yaml') | replace('REPLACE_WITH_REPO_URL', git_repo_url) }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: bootstrap_project_apply
  changed_when: "'created' in bootstrap_project_apply.stdout or 'configured' in bootstrap_project_apply.stdout"
  when: gitops_bootstrap_enabled | bool

- name: Apply root Argo CD Application
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: "{{ lookup('ansible.builtin.file', playbook_dir + '/../../platform/bootstrap/root-application.yaml') | replace('REPLACE_WITH_REPO_URL', git_repo_url) }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: root_application_apply
  changed_when: "'created' in root_application_apply.stdout or 'configured' in root_application_apply.stdout"
  when: gitops_bootstrap_enabled | bool
