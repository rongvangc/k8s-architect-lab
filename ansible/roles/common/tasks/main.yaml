---
- name: Assert supported operating system
  ansible.builtin.assert:
    that:
      - ansible_facts["distribution"] == "Ubuntu"
      - ansible_facts["distribution_major_version"] in ["22", "24"]
    fail_msg: This playbook supports Ubuntu 22.04 or 24.04 only.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gpg
      - git
      - jq
      - openssl
      - python3-debian
    state: present

- name: Disable swap immediately
  ansible.builtin.command:
    cmd: swapoff -a
  when: ansible_facts["swaptotal_mb"] | int > 0
  changed_when: true

- name: Disable swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^\s*([^#].*\s+swap\s+.*)$'
    replace: '# \1'
    backup: true

- name: Configure Kubernetes kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/kubernetes.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter
  notify: Load Kubernetes kernel modules

- name: Load required kernel modules now
  ansible.builtin.command:
    cmd: modprobe {{ item }}
  loop:
    - overlay
    - br_netfilter
  changed_when: false

- name: Configure Kubernetes sysctl
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
  notify: Apply Kubernetes sysctl

- name: Flush OS handlers before runtime installation
  ansible.builtin.meta: flush_handlers
