---
- name: Install containerd
  ansible.builtin.apt:
    name: containerd
    state: present

- name: Create containerd configuration directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Check containerd configuration
  ansible.builtin.stat:
    path: /etc/containerd/config.toml
  register: containerd_config

- name: Generate the initial containerd configuration
  ansible.builtin.command:
    cmd: containerd config default
  register: containerd_default_config
  when:
    - not containerd_config.stat.exists
    - not ansible_check_mode
  changed_when: true

- name: Write the initial containerd configuration
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    mode: "0644"
    content: "{{ containerd_default_config.stdout }}\n"
  when:
    - not containerd_config.stat.exists
    - not ansible_check_mode
  notify: Restart containerd

- name: Use systemd cgroups in containerd
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd
  when: containerd_config.stat.exists or not ansible_check_mode

- name: Enable and start containerd
  ansible.builtin.systemd_service:
    name: containerd
    enabled: true
    state: started
  when: containerd_config.stat.exists or not ansible_check_mode

- name: Flush containerd handler before kubelet starts
  ansible.builtin.meta: flush_handlers
