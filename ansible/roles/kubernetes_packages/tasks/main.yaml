---
- name: Create apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install Kubernetes repository signing key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: "0644"

- name: Configure Kubernetes apt repository
  ansible.builtin.deb822_repository:
    name: kubernetes
    types:
      - deb
    uris:
      - "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor }}/deb/"
    suites:
      - /
    signed_by: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    enabled: true
    state: present

- name: Refresh apt cache after repository change
  ansible.builtin.apt:
    update_cache: true

- name: Install Kubernetes node packages
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Enable kubelet
  ansible.builtin.systemd_service:
    name: kubelet
    enabled: true
