<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K8s Architect Lab</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101418;
        color: #f5f7fa;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 8vw, 72px);
        line-height: 0.95;
      }

      p {
        color: #b7c0ca;
        font-size: 18px;
        line-height: 1.6;
      }

      pre {
        margin-top: 28px;
        padding: 20px;
        overflow: auto;
        border: 1px solid #2d3742;
        border-radius: 8px;
        background: #171d23;
        color: #d7f7e3;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>K8s Architect Lab</h1>
      <p>Phase 1 is live: ingress, web, API, and Postgres are running through GitOps.</p>
      <pre id="api-status">Loading API status...</pre>
    </main>
    <script>
      async function loadApiStatus() {
        const output = document.getElementById("api-status");

        try {
          const response = await fetch("/api/info");
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = `API request failed: ${error.message}`;
        }
      }

      loadApiStatus();
    </script>
  </body>
</html>
