apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: food-delivery
spec:
  parentRefs:
    - name: food-delivery
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: api
          port: 4000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: 3000
