apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: k8s-architect-lab
  namespace: argocd
  labels:
    architect-lab.io/source: self
spec:
  description: Applications for the Kubernetes architect lab.
  sourceRepos:
    - REPLACE_WITH_REPO_URL
  destinations:
    - namespace: apps-dev
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: gateway.networking.k8s.io
      kind: Gateway
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
