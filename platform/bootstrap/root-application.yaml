apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-architect-lab-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-bootstrap
  source:
    repoURL: REPLACE_WITH_REPO_URL
    targetRevision: main
    path: platform/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
